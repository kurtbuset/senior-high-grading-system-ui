<div class="container-fluid">
  <div class="mb-4">
    <div class="card">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h1 class="page-title mb-1">Modify Account</h1>
          <p class="page-subtitle mb-0">Update your account information and password</p>
        </div>
      </div>
    </div>
  </div>
  
  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h5 class="mb-0">Account Information</h5>
        </div>
        <div class="card-body">
          <form (ngSubmit)="onSubmit(accountForm)" #accountForm="ngForm" novalidate>
            <div class="mb-3">
              <label class="form-label fw-bold" for="name">Name</label>
              <input
                id="name"
                class="form-control"
                [(ngModel)]="student.name"
                name="name"
                required
              />
              <div class="text-danger mt-1" *ngIf="accountForm.submitted && !student.name">
                Name is required
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold" for="email">Email</label>
              <input
                id="email"
                type="email"
                class="form-control"
                [(ngModel)]="student.email"
                name="email"
                required
                email
              />
              <div class="text-danger mt-1" *ngIf="accountForm.submitted && !student.email">
                Valid email is required
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold" for="password">Password</label>
              <input
                id="password"
                type="password"
                class="form-control"
                [(ngModel)]="student.password"
                name="password"
              />
              <div class="form-text text-muted">Leave blank to keep your current password.</div>
            </div>

            <div class="d-flex justify-content-end gap-2 mt-4">
              <button class="btn btn-secondary" type="reset">
                <i class="fas fa-redo me-1"></i>Reset
              </button>
              <button class="btn btn-primary" [disabled]="saving" type="submit">
                <span *ngIf="saving" class="spinner-border spinner-border-sm me-2" role="status"></span>
                <i *ngIf="!saving" class="fas fa-save me-1"></i>
                {{ saving ? 'Saving…' : 'Save Changes' }}
              </button>
            </div>

            <div class="mt-3 alert alert-success" *ngIf="message">
              <i class="fas fa-check-circle me-1"></i>{{ message }}
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
