<div class="container-fluid">
  <div class="mb-4">
    <div class="card">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h1 class="page-title mb-1">E-Grade</h1>
          <p class="page-subtitle mb-0">View your academic grades and performance</p>
        </div>
      </div>
    </div>
  </div>
  
  <div class="card shadow-sm">
    <div class="card-header bg-white">
      <h5 class="mb-0">Grade Summary</h5>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-striped data-table">
          <thead>
            <tr>
              <th>Subject</th>
              <th>Midterm</th>
              <th>Finals</th>
              <th>Final Grade</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let grade of grades">
              <td>{{ grade.subject }}</td>
              <td>{{ grade.midterm }}</td>
              <td>{{ grade.finals }}</td>
              <td>{{ getFinalGrade(grade) | number:'1.0-2' }}</td>
              <td>
                <span class="badge" [ngClass]="getGradeStatus(getFinalGrade(grade))">
                  {{ getGradeStatusText(getFinalGrade(grade)) }}
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
