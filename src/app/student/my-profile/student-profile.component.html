<div class="container-fluid">
  <div class="mb-4">
    <div class="card">
      <div class="card-body d-flex justify-content-between align-items-center">
        <div>
          <h1 class="page-title mb-1">My Profile</h1>
          <p class="page-subtitle mb-0">View and manage your personal information</p>
        </div>
      </div>
    </div>
  </div>
  
  <div class="row">
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-white">
          <h5 class="mb-0">Personal Information</h5>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Student ID</label>
              <p class="form-control-plaintext">{{ student.id }}</p>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Name</label>
              <p class="form-control-plaintext">{{ student.name }}</p>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Email</label>
              <p class="form-control-plaintext">{{ student.email }}</p>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Course</label>
              <p class="form-control-plaintext">{{ student.course }}</p>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label fw-bold">Year Level</label>
              <p class="form-control-plaintext">{{ student.yearLevel }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
