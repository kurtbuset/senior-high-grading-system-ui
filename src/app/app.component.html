<div class="d-flex" [ngClass]="{ 'no-sidebar': !account }">
  <!-- Sidebar -->
  <aside class="sidebar vh-100 position-fixed bg-light border-end" *ngIf="account" [ngClass]="{ 'collapsed': isCollapsed }">
    <!-- BC Logo -->
    <div class="logo-container text-center p-3 border-bottom">
      <img src="assets/benedicto-logo.svg" alt="Benedicto College Logo" class="logo mb-2">
      <h5 class="fw-bold text-primary">Benedicto College</h5>
    </div>

    <!-- Navigation Menu -->
    <nav class="nav flex-column nav-menu p-3">
      
      <!-- Admin Menu -->
      <ng-container *ngIf="account.role === Role.Admin">
        <a routerLink="/admin/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link nav-item">
          Dashboard
        </a>
        <a routerLink="/admin/subjects" routerLinkActive="active" class="nav-link nav-item">
          Subjects
        </a>
        <a routerLink="/admin/assignments" routerLinkActive="active" class="nav-link nav-item">
          Teacher Assignment
        </a>
        <a routerLink="/profile" routerLinkActive="active" class="nav-link nav-item">
          My Profile
        </a>
      </ng-container>

      <!-- Teacher Menu -->
      <ng-container *ngIf="account.role === Role.Teacher">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link nav-item">
          Dashboard
        </a>
        <a routerLink="/subject" routerLinkActive="active" class="nav-link nav-item">
          Subjects
        </a>
        <a routerLink="/profile" routerLinkActive="active" class="nav-link nav-item">
          My Profile
        </a>
      </ng-container>

      <!-- Student Menu -->
      <ng-container *ngIf="account.role === Role.Student">
        <a routerLink="/student/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-link nav-item">
          Dashboard
        </a>
        <a routerLink="/student/e-grade" routerLinkActive="active" class="nav-link nav-item">
          E-Grade
        </a>
        <a routerLink="/student/my-profile" routerLinkActive="active" class="nav-link nav-item">
          My Profile
        </a>
        <a routerLink="/student/modify-account" routerLinkActive="active" class="nav-link nav-item">
          Modify Account
        </a>
      </ng-container>

      <!-- Logout -->
      <a (click)="openLogoutModal()" class="nav-link nav-item logout mt-3 text-danger fw-bold" style="cursor: pointer">
        Logout
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content flex-grow-1" [ngClass]="{ 'login-page': !account }">
    <!-- Top Navbar (only if logged in) -->
    <nav class="navbar navbar-light bg-light border-bottom px-3" *ngIf="account">
      <button class="btn btn-outline-primary d-lg-none" (click)="isCollapsed = !isCollapsed">
        ☰ Menu
      </button>
    </nav>

    <alert></alert>
    <router-outlet></router-outlet>
  </main>

  <!-- Logout Modal -->
  <div class="modal-overlay" *ngIf="showLogoutModal" (click)="closeLogoutModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Confirm Logout</h3>
        <button type="button" class="btn-close" (click)="closeLogoutModal()">×</button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to logout from your account?</p>
        <small class="text-muted">You will need to login again to access your account.</small>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeLogoutModal()" [disabled]="loggingOut">Cancel</button>
        <button class="btn btn-danger" (click)="logout()" [disabled]="loggingOut">
          <span *ngIf="loggingOut" class="spinner-border spinner-border-sm me-2" role="status"></span>
          <span *ngIf="!loggingOut" class="logout-icon">🚪</span>
          {{ loggingOut ? 'Logging out...' : 'Logout' }}
        </button>
      </div>
    </div>
  </div>
</div>
